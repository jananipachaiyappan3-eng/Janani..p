<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Employee & Leave Management Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #333;
}

.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 2px 5px gray;
}

.section {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

input, select {
    padding: 10px;
    margin: 5px;
    width: 220px;
}

button {
    padding: 10px 15px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #0056b3;
}

.approve {
    background: green;
}

.reject {
    background: red;
}

table {
    width: 100%;
    border-collapse: collapse;
}

table, th, td {
    border: 1px solid #ddd;
}

th {
    background: #007bff;
    color: white;
}

th, td {
    padding: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <h1>HR Employee & Leave Management Tool</h1>

    <div class="dashboard">
        <div class="card">
            <h3>Total Employees</h3>
            <p id="employeeCount">0</p>
        </div>

        <div class="card">
            <h3>Pending Leave Requests</h3>
            <p id="leaveCount">0</p>
        </div>
    </div>

    <div class="section">
        <h2>Add Employee</h2>

        <input type="text" id="empName" placeholder="Employee Name">
        <input type="text" id="empDept" placeholder="Department">

        <button onclick="addEmployee()">Add Employee</button>
    </div>

    <div class="section">
        <h2>Apply Leave</h2>

        <select id="employeeSelect">
            <option>Select Employee</option>
        </select>

        <input type="date" id="leaveDate">

        <button onclick="applyLeave()">Apply Leave</button>
    </div>

    <div class="section">
        <h2>Employee List</h2>
        <ul id="employeeList"></ul>
    </div>

    <div class="section">
        <h2>Leave Requests</h2>

        <table>
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Leave Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="leaveTable"></tbody>
        </table>
    </div>

</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let leaves = JSON.parse(localStorage.getItem("leaves")) || [];

function saveData() {
    localStorage.setItem("employees", JSON.stringify(employees));
    localStorage.setItem("leaves", JSON.stringify(leaves));
}

function addEmployee() {

    let name = document.getElementById("empName").value.trim();
    let dept = document.getElementById("empDept").value.trim();

    if (name === "" || dept === "") {
        alert("Please enter all details");
        return;
    }

    employees.push({
        name: name,
        dept: dept
    });

    saveData();

    document.getElementById("empName").value = "";
    document.getElementById("empDept").value = "";

    displayEmployees();
}

function applyLeave() {

    let employee = document.getElementById("employeeSelect").value;
    let date = document.getElementById("leaveDate").value;

    if (employee === "Select Employee" || date === "") {
        alert("Select employee and date");
        return;
    }

    leaves.push({
        employee: employee,
        date: date,
        status: "Pending"
    });

    saveData();
    displayLeaves();
}

function displayEmployees() {

    let list = document.getElementById("employeeList");
    let select = document.getElementById("employeeSelect");

    list.innerHTML = "";
    select.innerHTML = "";

    employees.forEach(emp => {

        let li = document.createElement("li");
        li.textContent = emp.name + " - " + emp.dept;
        list.appendChild(li);

        let option = document.createElement("option");
        option.value = emp.name;
        option.textContent = emp.name;
        select.appendChild(option);
    });

    document.getElementById("employeeCount").textContent =
        employees.length;
}

function displayLeaves() {

    let table = document.getElementById("leaveTable");
    table.innerHTML = "";

    let pending = 0;

    leaves.forEach((leave, index) => {

        if (leave.status === "Pending") {
            pending++;
        }

        table.innerHTML += `
        <tr>
            <td>${leave.employee}</td>
            <td>${leave.date}</td>
            <td>${leave.status}</td>
            <td>
                <button class="approve"
                    onclick="updateStatus(${index}, 'Approved')">
                    Approve
                </button>

                <button class="reject"
                    onclick="updateStatus(${index}, 'Rejected')">
                    Reject
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("leaveCount").textContent = pending;
}

function updateStatus(index, status) {
    leaves[index].status = status;
    saveData();
    displayLeaves();
}

displayEmployees();
displayLeaves();
</script>

</body>
</html>
